<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شهر فرش قزوین</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:#000;
    font-family:Tahoma,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* پس زمینه متحرک */
.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, #666 0%, #000 25%),
    radial-gradient(circle at 80% 30%, #444 0%, #000 30%),
    radial-gradient(circle at 40% 80%, #555 0%, #000 35%);
    filter:grayscale(100%);
    animation:bgMove 12s infinite alternate ease-in-out;
}

@keyframes bgMove{
    from{
        transform:scale(1) rotate(0deg);
    }
    to{
        transform:scale(1.25) rotate(6deg);
    }
}

/* نویز */
.noise{
    position:fixed;
    inset:0;
    opacity:.08;
    background-image:
    repeating-radial-gradient(circle,#fff 0 1px,transparent 2px 4px);
    animation:flicker .12s infinite;
}

@keyframes flicker{
    50%{
        opacity:.14;
    }
}

.container{
    position:relative;
    z-index:2;
    text-align:center;
    padding:40px;
    background:rgba(0,0,0,.75);
    border:1px solid #555;
    border-radius:12px;
    box-shadow:0 0 40px rgba(255,255,255,.15);
}

h1{
    color:#fff;
    margin-bottom:25px;
    font-size:32px;
    text-shadow:0 0 15px rgba(255,255,255,.5);
}

.subtitle{
    color:#aaa;
    margin-bottom:30px;
    font-size:15px;
}

.download-btn{
    display:inline-block;
    text-decoration:none;
    background:#fff;
    color:#000;
    font-size:20px;
    font-weight:bold;
    padding:15px 45px;
    border-radius:8px;
    transition:.3s;
}

.download-btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px #fff;
}

.footer{
    margin-top:20px;
    color:#777;
    font-size:13px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="noise"></div>

<div class="container">
    <h1>شهر فرش قزوین</h1>

    <div class="subtitle">
        دانلود فایل نصب برنامه
    </div>

    <a href="shasf.apk" download class="download-btn">
        دانلود
    </a>

    <div class="footer">
        نسخه رسمی شهر فرش قزوین
    </div>
</div>

</body>
</html>
