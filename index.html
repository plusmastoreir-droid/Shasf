<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شهر فرش قزوین</title>

<style>
@font-face{
    font-family:'VazirmatnRD';
    src:url('Vazirmatn-RD-Regular.woff2') format('woff2');
    font-weight:normal;
    font-style:normal;
}
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:'VazirmatnRD',Tahoma,sans-serif;
    overflow-x:hidden;
}

/* نوار بالا */
.top-bar{
    width:100%;
    padding:8px 0;
    text-align:center;
    font-size:12px;
    color:#aaa;
    border-bottom:1px solid #333;
}

/* پس زمینه */
.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, #666 0%, #000 25%),
    radial-gradient(circle at 80% 30%, #444 0%, #000 30%),
    radial-gradient(circle at 40% 80%, #555 0%, #000 35%);
    filter:grayscale(100%);
    animation:move 12s infinite alternate;
    z-index:-2;
}

@keyframes move{
    0%{transform:scale(1) rotate(0deg);}
    100%{transform:scale(1.2) rotate(5deg);}
}

.noise{
    position:fixed;
    inset:0;
    opacity:.08;
    background-image:repeating-radial-gradient(circle,#fff 0 1px,transparent 2px 4px);
    animation:flicker .15s infinite;
    z-index:-1;
}

@keyframes flicker{
    50%{opacity:.14;}
}

/* کادر اصلی */
.container{
    max-width:500px;
    margin:40px auto;
    text-align:center;
    padding:20px;
}

/* عنوان */
h1{
    font-family:'VazirmatnRD',Tahoma,sans-serif;
    font-weight:700;
    letter-spacing:1px;
}

/* تریلر */
.video-box video{
    width:100%;
    border-radius:10px;
    border:1px solid #444;
}

.slider-btns{
    margin-top:10px;
}

.slider-btns button{
    background:#fff;
    color:#000;
    border:none;
    padding:8px 14px;
    margin:0 5px;
    border-radius:5px;
}

/* شمارنده */
#counter{
    margin:20px 0;
    color:#ccc;
}

/* دکمه */
.btn{
    display:inline-block;
    background:#fff;
    color:#000;
    padding:15px 40px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

.btn:hover{
    transform:scale(1.05);
}
#loader{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
}

.splash-logo{
width:180px;
max-width:60vw;
animation:splash 1.5s ease-in-out infinite alternate;
}

@keyframes splash{
from{
transform:scale(0.95);
opacity:0.8;
}
to{
transform:scale(1.05);
opacity:1;
}
}
#loader{
transition:opacity .5s ease;
}
</style>
</head>

<body>
<div id="loader">
    <img src="logo.png" class="splash-logo">
</div>
<div class="bg"></div>
<div class="noise"></div>

<div class="top-bar">
Made by Aghey | @shasf_gams
</div>

<div class="container">

<h1>شهر فرش قزوین</h1>

<!-- تریلر -->
<div class="video-box">
    <video id="trailer" controls></video>
    <div class="slider-btns">
        <button onclick="prevVideo()">◀</button>
        <button onclick="nextVideo()">▶</button>
    </div>
</div>

<p id="counter">تعداد دانلود: ...</p>

<a href="#" class="btn" onclick="openLink()">
دانلود
</a>

</div>

<script>
    window.addEventListener("load",()=>{

setTimeout(()=>{
document.getElementById("loader").style.opacity="0";

setTimeout(()=>{
document.getElementById("loader").remove();
},500);

},2000);

});
const KEY = "shahrfarsh-qazvin-downloads";

const trailers = [
    "trailer1.mp4",
    "trailer2.mp4"
];

let index = 0;
const player = document.getElementById("trailer");

/* لود اولیه */
function load(){
    player.src = trailers[index];
    player.load();
}

load();
    
    player.addEventListener("ended",()=>{

    index++;

    if(index >= trailers.length){
        index = 0;
    }

    load();

    player.play();
});

/* قبلی */
function prevVideo(){
    index--;
    if(index < 0) index = trailers.length - 1;
    load();
}

    function nextVideo(){
    index++;

    if(index >= trailers.length){
        index = 0;
    }

    load();
    }
/* شمارنده */
fetch(`https://countapi.mileshilliard.com/api/v1/get/${KEY}`)
.then(r => r.json())
.then(d => {
    document.getElementById("counter").innerText =
    "تعداد دانلود: " + (d.value || 0);
});

/* دانلود + شمارش */
function openLink(){

    fetch(`https://countapi.mileshilliard.com/api/v1/hit/${KEY}`);

    window.open(
        "https://drive.google.com/uc?export=download&id=1fXFivRtdP0ehig60SgW_DXDKux-2oiAI",
        "_blank"
    );
}
</script>

</body>
</html>
